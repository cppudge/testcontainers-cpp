# CI on every branch push: build + unit + integration on Linux (gcc) and
# Windows (MSVC, Windows containers), a minimal-features Linux build
# (TC_TLS=OFF + TC_HOST_PORT_FORWARDING=OFF — no OpenSSL/libssh2 anywhere),
# the integration suite against a real mutual-TLS daemon (docker:dind),
# plus the static/dynamic analysis gates — clang-format, clang-tidy, and an
# ASan+UBSan test run. CodeQL lives in its own workflow (codeql.yml).
#
# Public repo => GitHub-hosted standard runners are free with no minute cap;
# the only budgeted resource is the 10 GB Actions cache, which the project-
# local Conan home fits comfortably (ConanCenter ships gcc Release prebuilts,
# so cold configures mostly download rather than compile).
#
# ubuntu-24.04 runners ship everything else the preset needs: cmake >= 3.28,
# gcc 13 (C++20), Docker Engine + compose v2 (the integration suite and the
# local compose client run as-is; TLS-only and Windows-container tests
# self-skip).
name: CI

on:
  # Same-repo branch pushes (the owner works directly on this repo) build here.
  push:
    branches: ['**']
  # Fork PRs can't push branches to this repo, so without a pull_request trigger
  # they'd get no CI. Adding it means SAME-repo PRs would run twice (once for the
  # push, once for the PR), so every job below carries a fork-only guard:
  #   if: github.event_name == 'push'
  #       || github.event.pull_request.head.repo.full_name != github.repository
  # which skips the pull_request run for same-repo PRs (their push already covers
  # them) and runs it only when the PR head is a fork.
  pull_request:
  workflow_dispatch:

# Key the concurrency group on the event name too: a push run and a pull_request
# run of the same ref must land in different groups so they don't cancel each
# other (a fork PR's merge ref won't collide with a branch ref, but this keys
# them apart regardless).
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (gcc, Release)
    # Fork-only PR guard (see the pull_request note under `on:` above).
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja + conan
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build
          pipx install conan

      # The ninja preset keeps the Conan home project-local (./.conan2), so
      # one cache entry carries all dependency packages. Keyed on the recipe:
      # a dependency bump invalidates it, restore-keys still seed the rebuild.
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: .conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ runner.os }}-

      # TC_WERROR hardens the project's -Wall -Wextra into errors on CI only
      # (the option defaults OFF so new-compiler warnings never break users).
      - name: Configure
        run: cmake --preset ninja -DTC_WERROR=ON

      - name: Build
        run: cmake --build build/ninja

      - name: Unit tests
        run: ./build/ninja/bin/tc_unit_tests --gtest_brief=1

      # The runner's Docker daemon is a plain Linux engine over the unix
      # socket — the primary POSIX transport. Pulls (redis, alpine,
      # docker:26.1-cli, ryuk, sshd) dominate the wall clock on cold runs.
      # The step timeout turns a wedged daemon into a fast red instead of
      # eating the whole job timeout; full (non-brief) gtest output names
      # every [ RUN ] test case so a hang points at its culprit.
      - name: Integration tests
        timeout-minutes: 20
        run: ./build/ninja/bin/tc_integration_tests

  # The feature knob under test: TC_TLS=OFF + TC_HOST_PORT_FORWARDING=OFF must
  # (a) build and pass both suites, and (b) keep OpenSSL and libssh2 out of the
  # dependency graph and off every link line — the whole point of the options
  # is a consumer avoiding a transitive OpenSSL. The disabled-feature paths
  # swap their integration suites for refusal checks (TlsTransport.*,
  # HostAccess.*); everything else exercises the default transports as usual.
  # Known gap: the minimal configuration is CI-built on Linux only (the
  # Windows job builds the default one) — the guarded code is
  # platform-agnostic, and MSVC-minimal was verified out-of-band.
  linux-minimal:
    name: Linux (gcc, no TLS / no host-port-forwarding)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja + conan
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build
          pipx install conan

      # Own primary key: this job's graph lacks openssl/libssh2, and a key
      # shared with the full job would let whichever saves first strip those
      # packages from the other's cache. restore-keys still seed from it.
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: .conan2
          key: conan-minimal-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-minimal-${{ runner.os }}-
            conan-${{ runner.os }}-

      - name: Configure
        run: >
          cmake --preset ninja -DTC_WERROR=ON
          -DTC_TLS=OFF -DTC_HOST_PORT_FORWARDING=OFF

      # build.ninja carries every compile and link line of the build — if
      # neither OpenSSL nor libssh2 appears there, the binary cannot link them.
      - name: Assert OpenSSL and libssh2 are absent from the build
        run: |
          if grep -qiE 'openssl|libssl|libcrypto|libssh2' build/ninja/build.ninja; then
            echo "::error::minimal build still references OpenSSL/libssh2"
            grep -inE 'openssl|libssl|libcrypto|libssh2' build/ninja/build.ninja | head
            exit 1
          fi

      - name: Build
        run: cmake --build build/ninja

      # Full (non-brief) output + a step timeout on THIS job's unit step: it
      # hung twice on 2026-07-08 (runs 28937239824, 28951489692) — traced to a
      # LoopbackServer teardown race in a test only THIS configuration compiles
      # (TransportTimeoutTest.cpp, fixed there). Kept as cheap insurance: any
      # future wedge fails after 5 minutes with its culprit named by the log's
      # dangling "[ RUN ]" line, instead of a silent 45-minute job timeout.
      - name: Unit tests
        timeout-minutes: 5
        run: ./build/ninja/bin/tc_unit_tests

      - name: Integration tests
        timeout-minutes: 20
        run: ./build/ninja/bin/tc_integration_tests

  # The integration suite against a REAL TLS daemon: docker:dind generates a
  # CA + server/client certs (DOCKER_TLS_CERTDIR) and enforces --tlsverify,
  # so this exercises mutual TLS end to end — server verification, the client
  # certificate, pulls, exec streaming — the path the in-process echo-server
  # tests cannot cover (it is where the never-presented-client-cert bug hid).
  #
  # Topology: dind stays on the default bridge (host networking would fight
  # the runner daemon over docker0) and the suite talks to the dind container
  # IP, aliased as "docker" in /etc/hosts — that name is always in the server
  # cert's SANs (it is the container's hostname). Ports published by INNER
  # containers (Ryuk's, Redis's) bind inside dind's netns, so they are
  # reachable at that same IP — port waits and readiness pings just work.
  tls-e2e:
    name: Linux (TLS daemon, dind)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja + conan
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build
          pipx install conan

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: .conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ runner.os }}-

      - name: Configure
        run: cmake --preset ninja -DTC_WERROR=ON

      - name: Build
        run: cmake --build build/ninja

      - name: Start a TLS dockerd (docker:dind)
        run: |
          mkdir -p "$PWD/dind-certs"
          docker run -d --name dind --privileged --hostname docker \
            -e DOCKER_TLS_CERTDIR=/certs \
            -v "$PWD/dind-certs:/certs" \
            docker:dind
          echo "$(docker inspect -f '{{.NetworkSettings.IPAddress}}' dind) docker" | sudo tee -a /etc/hosts

          # The generated materials appear once dockerd is up; the keys are
          # root-owned 0600, so open the tree up for the test process.
          ok=""
          for _ in $(seq 1 45); do
            if [ -f dind-certs/client/key.pem ]; then ok=1; break; fi
            sleep 2
          done
          [ -n "$ok" ] || { echo "::error::dind never wrote client certs"; docker logs dind; exit 1; }
          sudo chmod -R a+rX dind-certs

          # Readiness over the real TLS endpoint. The docker CLI has no
          # https:// DOCKER_HOST form — tcp:// + --tlsverify is its spelling.
          ok=""
          for _ in $(seq 1 30); do
            if docker --host tcp://docker:2376 --tlsverify \
                 --tlscacert dind-certs/client/ca.pem \
                 --tlscert dind-certs/client/cert.pem \
                 --tlskey dind-certs/client/key.pem version >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          [ -n "$ok" ] || { echo "::error::dind TLS endpoint never became ready"; docker logs dind; exit 1; }

      # Compose is excluded: its tests drive the docker CLI, which cannot take
      # an https:// DOCKER_HOST (compose coverage lives in the plain-transport
      # jobs). Exec-stdin tests self-skip on TLS (no half-close) — and their
      # TLS-only sibling (StdinThrowsOnNonHalfClosableTransport) runs ONLY
      # here, so this job adds coverage the other jobs skip.
      - name: Integration tests (mutual TLS)
        timeout-minutes: 25
        env:
          DOCKER_HOST: https://docker:2376
          DOCKER_TLS_VERIFY: '1'
          DOCKER_CERT_PATH: ${{ github.workspace }}/dind-certs/client
        run: ./build/ninja/bin/tc_integration_tests --gtest_filter='-Compose.*'

      - name: dind daemon log (on failure)
        if: failure()
        run: docker logs dind 2>&1 | tail -100

  windows:
    name: Windows (MSVC, Release)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # The ninja preset needs cl.exe on PATH (the same MSVC dev-shell setup
      # the local build uses).
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install conan
        run: pipx install conan

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: .conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ runner.os }}-

      # /Z7 + /DEBUG produce PDBs for OUR targets in the Release build (the
      # Conan dependencies stay plain Release), so a hang dump captured below
      # can be symbolized locally in WinDbg/VS. /Z7 embeds the debug info in
      # the objects — no compiler-PDB contention under ninja's parallelism.
      - name: Configure
        run: >
          cmake --preset ninja -DTC_WERROR=ON
          "-DCMAKE_CXX_FLAGS_RELEASE=/O2 /Ob2 /DNDEBUG /Z7"
          "-DCMAKE_EXE_LINKER_FLAGS_RELEASE=/DEBUG /INCREMENTAL:NO"

      - name: Build
        run: cmake --build build/ninja

      - name: Unit tests
        run: ./build/ninja/bin/tc_unit_tests.exe --gtest_brief=1

      # Some windows-2022 runners come up with the Docker service stopped —
      # the daemon-dependent suites would then ALL self-skip and the job would
      # pass hollow (observed in practice). Start the service and require the
      # daemon to answer, so "no daemon" is a hard red, not a silent skip.
      - name: Ensure the Docker engine is running
        run: |
          $svc = Get-Service docker -ErrorAction SilentlyContinue
          if (-not $svc) { Write-Error "Docker service is not installed on this runner"; exit 1 }
          if ($svc.Status -ne 'Running') { Start-Service docker }
          docker version --format 'daemon os: {{.Server.Os}}'

      # The runner's daemon (npipe transport) runs WINDOWS containers: the
      # Linux-guarded suites self-skip, while WindowsContainer.* really runs —
      # nanoserver:ltsc2022 is pre-cached on windows-2022 images, and the test
      # resolves the tag from the daemon's build (an unknown build FAILS, so a
      # runner-image upgrade cannot silently hollow this job out). Full gtest
      # output names every [ RUN ] test case so a hang points at its culprit.
      #
      # The tests run under a 10-minute watchdog: on expiry a FULL process
      # dump is captured with Sysinternals procdump and uploaded as an
      # artifact (with the exe+pdb) so the hang can be debugged locally
      # (WinDbg: `~*k` for all thread stacks). The step timeout stays above
      # the watchdog so the dump path always gets to run.
      - name: Integration tests (Windows engine)
        timeout-minutes: 25
        run: |
          $p = Start-Process -FilePath ./build/ninja/bin/tc_integration_tests.exe -NoNewWindow -PassThru
          if ($p.WaitForExit(10 * 60 * 1000)) {
            exit $p.ExitCode
          }
          Write-Warning "integration tests still running after 10 min - capturing a full dump of PID $($p.Id)"
          Invoke-WebRequest https://download.sysinternals.com/files/Procdump.zip -OutFile procdump.zip
          Expand-Archive procdump.zip -DestinationPath procdump
          ./procdump/procdump64.exe -accepteula -ma $p.Id hung-integration.dmp
          Stop-Process -Id $p.Id -Force
          exit 124

      - name: Upload hang dump (exe + pdb + dmp)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-integration-hang-dump
          path: |
            hung-integration.dmp
            build/ninja/bin/tc_integration_tests.exe
            build/ninja/bin/tc_integration_tests.pdb
          if-no-files-found: ignore

  # The consumer's view of the library: `conan create` builds the package from
  # the recipe and then builds + runs test_package against it (find_package,
  # link, run — no Docker needed), catching install-tree and package_info
  # mistakes the in-repo builds never see. macOS appears ONLY here, and is the
  # one job that runs the unit suite on apple-clang (skip_test=False); Linux
  # and Windows skip the test build — their unit suites already run above.
  conan-package:
    name: conan create (${{ matrix.os }})
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            skip_test: 'True'
          - os: windows-2022
            skip_test: 'True'
          - os: macos-14
            skip_test: 'False'
    steps:
      - uses: actions/checkout@v4

      - name: Install conan
        run: pipx install conan

      # The global Conan home this time (no preset / cmake-conan provider in
      # this flow): cache the package storage only — profiles are re-detected
      # every run.
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-create-${{ matrix.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-create-${{ matrix.os }}-

      - name: Detect profile
        run: conan profile detect --force

      # cppstd=20 is required by the recipe's validate() — detected profiles
      # default to gnu17 and the toolchain would honor that, so an explicit
      # setting is the correct (loud) contract, not a workaround.
      - name: conan create
        run: >
          conan create . --build=missing
          -s compiler.cppstd=20
          -c tools.build:skip_test=${{ matrix.skip_test }}

      # The one option combination no other job builds: tls=False with
      # host_port_forwarding=True keeps OpenSSL in the graph for libssh2 but
      # ships libcrypto WITHOUT libssl in cpp_info.requires — a package_info()
      # branch the default and minimal builds never execute. test_package's
      # find_package + link + run is what validates those component names.
      # Ubuntu only: recipe logic is platform-independent and the packages are
      # already cached from the step above.
      - name: conan create (tls=False, host_port_forwarding=True)
        if: matrix.os == 'ubuntu-24.04'
        run: >
          conan create . --build=missing
          -o '&:tls=False'
          -s compiler.cppstd=20
          -c tools.build:skip_test=True

  # Formatting gate: the tree must be byte-identical to what the PINNED
  # clang-format produces (.clang-format documents the local install command).
  # Seconds of runtime — no cache, no configure.
  format:
    name: clang-format
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format (pinned)
        run: pipx install clang-format==22.1.5

      - name: Check formatting
        run: git ls-files -z '*.cpp' '*.hpp' | xargs -0 clang-format --dry-run --Werror

      # The ConanCenter recipe ships a verbatim copy of test_package/ — an
      # edit to one that misses the other would silently skew the submitted
      # copy, so byte-compare them here (cheapest job, no configure).
      - name: Check the CCI test_package copy is in sync
        run: >
          diff -r --exclude=build --exclude=CMakeUserPresets.json
          test_package packaging/conan-center/recipes/testcontainers-cpp/all/test_package

  # clang-tidy over the Ninja compile database with the checked-in .clang-tidy
  # set (the same one clangd uses in-editor). The wheel pins the analyzer
  # version so editor, this job, and a local run agree on findings. Configure
  # only — no generated headers exist, so the compile database is complete
  # without a build.
  tidy:
    name: clang-tidy
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja + conan + clang-tidy (pinned)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build
          pipx install conan
          pipx install clang-tidy==18.1.8

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: .conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ runner.os }}-

      - name: Configure
        run: cmake --preset ninja

      # xargs exits 123 if any clang-tidy invocation fails, which
      # --warnings-as-errors makes happen on any finding.
      - name: Run clang-tidy
        run: >
          git ls-files -z 'src/*.cpp' 'tests/*.cpp' 'examples/*.cpp'
          | xargs -0 -P "$(nproc)" -n 2 clang-tidy -p build/ninja --quiet
          --warnings-as-errors='*'

  # ASan + UBSan over both test suites: HTTP parsing, tar building, and the
  # log-demux framing are exactly where heap overflows and UB hide. The Conan
  # dependencies stay plain Release (ASan tolerates uninstrumented code); only
  # our objects are instrumented. -fno-sanitize-recover turns any UB finding
  # into a hard failure.
  sanitizers:
    name: Linux (ASan + UBSan)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja + conan
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build
          pipx install conan

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: .conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ runner.os }}-

      # Kernels with 32-bit mmap ASLR entropy break ASan's shadow mapping:
      # the process dies in a recursive "AddressSanitizer:DEADLYSIGNAL" loop
      # (observed locally on a 6.6 kernel — a 100%-CPU hang, not a crash).
      # 28 bits is the documented workaround.
      - name: Lower mmap ASLR entropy for ASan
        run: sudo sysctl -w vm.mmap_rnd_bits=28

      - name: Configure
        run: >
          cmake --preset ninja
          "-DCMAKE_CXX_FLAGS=-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g"
          "-DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build/ninja

      # detect_container_overflow needs whole-program instrumentation to be
      # sound; with uninstrumented deps reading our std::string buffers
      # (libarchive, OpenSSL) it false-positives, so it is off by design.
      # fast_unwind_on_malloc=0 (slow DWARF unwinder) because the fast one
      # cannot walk the frame-pointer-less Conan OpenSSL: leak stacks would
      # collapse to two frames, unmatchable by .lsan-suppressions.txt and
      # useless for triage. The suite is daemon-I/O-bound, so the extra
      # allocation cost stays in the noise.
      - name: Unit tests (sanitized)
        env:
          ASAN_OPTIONS: detect_container_overflow=0:fast_unwind_on_malloc=0
          LSAN_OPTIONS: suppressions=.lsan-suppressions.txt
          UBSAN_OPTIONS: print_stacktrace=1
        run: ./build/ninja/bin/tc_unit_tests --gtest_brief=1

      - name: Integration tests (sanitized)
        timeout-minutes: 30
        env:
          ASAN_OPTIONS: detect_container_overflow=0:fast_unwind_on_malloc=0
          LSAN_OPTIONS: suppressions=.lsan-suppressions.txt
          UBSAN_OPTIONS: print_stacktrace=1
        run: ./build/ninja/bin/tc_integration_tests
