# Linux CI: build + unit + integration on every branch push.
#
# Public repo => GitHub-hosted standard runners are free with no minute cap;
# the only budgeted resource is the 10 GB Actions cache, which the project-
# local Conan home fits comfortably (ConanCenter ships gcc Release prebuilts,
# so cold configures mostly download rather than compile).
#
# ubuntu-24.04 runners ship everything else the preset needs: cmake >= 3.28,
# gcc 13 (C++20), Docker Engine + compose v2 (the integration suite and the
# local compose client run as-is; TLS-only and Windows-container tests
# self-skip).
name: CI

on:
  push:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (gcc, Release)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja + conan
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build
          pipx install conan

      # The ninja preset keeps the Conan home project-local (./.conan2), so
      # one cache entry carries all dependency packages. Keyed on the recipe:
      # a dependency bump invalidates it, restore-keys still seed the rebuild.
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: .conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ runner.os }}-

      - name: Configure
        run: cmake --preset ninja

      - name: Build
        run: cmake --build build/ninja

      - name: Unit tests
        run: ./build/ninja/bin/tc_unit_tests --gtest_brief=1

      # The runner's Docker daemon is a plain Linux engine over the unix
      # socket — the primary POSIX transport. Pulls (redis, alpine,
      # docker:26.1-cli, ryuk) dominate the wall clock on cold runs.
      - name: Integration tests
        run: ./build/ninja/bin/tc_integration_tests --gtest_brief=1

  windows:
    name: Windows (MSVC, Release)
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # The ninja preset needs cl.exe on PATH (the same MSVC dev-shell setup
      # the local build uses).
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install conan
        run: pipx install conan

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: .conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ runner.os }}-

      - name: Configure
        run: cmake --preset ninja

      - name: Build
        run: cmake --build build/ninja

      - name: Unit tests
        run: ./build/ninja/bin/tc_unit_tests.exe --gtest_brief=1

      # The runner's daemon (npipe transport) runs WINDOWS containers: the
      # Linux-guarded suites self-skip, while WindowsContainer.* really runs —
      # nanoserver:ltsc2022 is pre-cached on windows-2022 images, and the test
      # resolves the tag from the daemon's build (an unknown build FAILS, so a
      # runner-image upgrade cannot silently hollow this job out).
      - name: Integration tests (Windows engine)
        run: ./build/ninja/bin/tc_integration_tests.exe --gtest_brief=1
